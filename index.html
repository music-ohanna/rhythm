        function restPiecesForDuration(duration) {
            const pieces = [];
            let remaining = duration;
            const candidates = [
                {type: 'whole', dotted: false, beats: 4},
                {type: 'half', dotted: true, beats: 3},
                {type: 'half', dotted: false, beats: 2},
                {type: 'quarter', dotted: true, beats: 1.5},
                {type: 'quarter', dotted: false, beats: 1},
                {type: 'eighth', dotted: true, beats: 0.75},
                {type: 'eighth', dotted: false, beats: 0.5},
                {type: 'sixteenth', dotted: true, beats: 0.375},
                {type: 'sixteenth', dotted: false, beats: 0.25},
                {type: 'thirtysecond', dotted: false, beats: 0.125}
            ];

            while (remaining > 0.001) {
                const candidate = candidates.find(c => c.beats <= remaining + 0.001) || candidates[candidates.length - 1];
                pieces.push(candidate);
                remaining -= candidate.beats;
                if (pieces.length > 64) break;
            }
            return pieces;
        }

        function buildAutoRestGuides(startX, measureWidth, totalBeats, cellWidth) {
            if (notes.length === 0) return [];
            const {gaps} = getTimelineGaps();
            const autoRests = [];
            const isOnBeat = (value) => Math.abs(value - Math.round(value)) < 0.001;

            gaps.forEach(gap => {
                const gapEnd = gap.start + gap.duration;
                let offset = gap.start;

                // 중간 박에서 생긴 빈칸은 다음 박선까지만 먼저 쉼표로 채웁니다.
                // 예: 8분음표+16분음표 뒤 0.25박 빈칸은 16분쉼표로 먼저 보이게 합니다.
                while (offset < gapEnd - 0.001) {
                    const segmentEnd = isOnBeat(offset)
                        ? gapEnd
                        : Math.min(Math.ceil(offset + 0.001), gapEnd);
                    const segmentDuration = segmentEnd - offset;

                    let pieceOffset = offset;
                    restPiecesForDuration(segmentDuration).forEach(piece => {
                        const beatDuration = piece.beats;
                        const rest = {
                            type: piece.type,
                            isRest: true,
                            beatOffset: pieceOffset,
                            dotted: piece.dotted,
                            autoRest: true,
                            beatDuration
                        };
                        rest.startX = startX + (rest.beatOffset / totalBeats) * measureWidth;
                        rest.endX = startX + ((rest.beatOffset + beatDuration) / totalBeats) * measureWidth;
                        const restWidth = rest.endX - rest.startX;
                        rest.x = rest.startX + Math.min(cellWidth / 2, restWidth / 2);
                        autoRests.push(rest);
                        pieceOffset += beatDuration;
                    });

                    offset = segmentEnd;
                }
            });

            return autoRests;
        }

        function drawAutoRestGuideLabel(autoRestCount, startX, measureWidth, blockY) {
            if (autoRestCount === 0) return;
            rhythmCtx.save();
            rhythmCtx.fillStyle = 'rgba(248, 250, 252, 0.92)';
            rhythmCtx.strokeStyle = 'rgba(100, 116, 139, 0.55)';
            rhythmCtx.lineWidth = 1.2;
            const labelW = 178;
            const labelH = 25;
            const x = startX + measureWidth - labelW - 8;
            const y = blockY - blockHeight/2 - 34;
            drawRoundedRect(rhythmCtx, x, y, labelW, labelH, 10, true, true);
            rhythmCtx.fillStyle = AUTO_REST_COLOR;
            rhythmCtx.font = 'bold 11px "Noto Sans KR"';
            rhythmCtx.textAlign = 'center';
            rhythmCtx.textBaseline = 'middle';
            rhythmCtx.fillText('빈칸은 직접 채워 주세요', x + labelW/2, y + labelH/2 + 0.5);
            rhythmCtx.restore();
        }

        function addNote(type, isRest, x, dotted=false) {
            const beatOffset = getLastTimelineEnd();
            addDurationAtOffset(type, isRest, beatOffset, dotted);
        }


        function isBeamableStandardNote(n) {
            return n && !n.isRest && !n.autoRest && n.type !== 'triplet' &&
                (n.type === 'eighth' || n.type === 'sixteenth' || n.type === 'thirtysecond');
        }

        function beamLineCount(n) {
            if (!n || n.isRest) return 0;
            if (n.type === 'eighth' || n.type === 'triplet') return 1;
            if (n.type === 'sixteenth') return 2;
            if (n.type === 'thirtysecond') return 3;
            return 0;
        }

        function canJoinBeamGroup(group, candidate) {
            if (!isBeamableStandardNote(candidate)) return false;
            const previous = group[group.length - 1];
            const expectedStart = previous.beatOffset + getBeat(previous.type, previous.dotted);
            if (Math.abs(candidate.beatOffset - expectedStart) > 0.01) return false;
            const beatStart = Math.floor(group[0].beatOffset + 0.001);
            const candidateEnd = candidate.beatOffset + getBeat(candidate.type, candidate.dotted);
            if (candidateEnd > beatStart + 1 + 0.001) return false;

            // 16분음표가 8분음표처럼 보이는 혼동을 줄이기 위해 빔 묶음 규칙을 단순화합니다.
            // 허용: 8분+8분, 16분+16분(또는 여러 16분), 점8분+16분.
            // 불허: 8분+16분처럼 학생 눈에 16분이 8분으로 보이기 쉬운 혼합 묶음.
            if (group.length === 1 && group[0].dotted && group[0].type === 'eighth' && !candidate.dotted && candidate.type === 'sixteenth') {
                return true;
            }
            // 16분음표 뒤에 점8분음표가 오는 경우도 한 박 안의 부점리듬으로 묶습니다.
            if (group.length === 1 && !group[0].dotted && group[0].type === 'sixteenth' && candidate.dotted && candidate.type === 'eighth') {
                return true;
            }
            if (group.some(n => n.dotted) || candidate.dotted) {
                return false;
            }
            return group.every(n => n.type === candidate.type);
        }

        function sameTripletBeat(a, b) {
            return a.type === 'triplet' && b.type === 'triplet' && getTripletBeatStart(a) === getTripletBeatStart(b);
        }

        function drawAll() {
            rhythmCtx.clearRect(0, 0, rhythmCanvas.width, rhythmCanvas.height);
            
            const startX = 200; 
            const endX = rhythmCanvas.width - 100; 
            const measureWidth = endX - startX;
            const totalBeats = getVisibleTimelineBeats();
            const visibleMeasures = getVisibleMeasureCount();

            const subdivisionsPerBeat = 4;
            const totalCells = totalBeats * subdivisionsPerBeat;
            const cellWidth = measureWidth / totalCells;
            const beatWidth = measureWidth / totalBeats;

            // 순차 구조 분석 및 빔 그룹화 안정화를 위해 음표 배열을 항상 시간순으로 자동 정렬합니다.
            normalizeTripletSets();
            notes.sort((a, b) => a.beatOffset - b.beatOffset);

            // 모든 음표 좌표의 공간적 일치 정렬 수행
            notes.forEach(n => {
                n.beatDuration = getBeat(n.type, n.dotted);
                n.startX = startX + (n.beatOffset / totalBeats) * measureWidth;
                n.endX = startX + ((n.beatOffset + n.beatDuration) / totalBeats) * measureWidth;
                
                // 음표 머리는 점선 위가 아니라 실제로 차지하는 첫 선택 단위의 중심축에 맞춥니다.
                // 16분음표 이상은 첫 16분 칸 중심, 32분음표는 반 칸 중심에 놓여 네모칸과 수직 정렬됩니다.
                const noteWidth = n.endX - n.startX;
                const headOffset = Math.min(cellWidth / 2, noteWidth / 2);
                n.x = (n.type === 'triplet') ? (n.startX + n.endX) / 2 : n.startX + headOffset;
            });

            const displayNotes = notes.slice().sort((a, b) => a.beatOffset - b.beatOffset);

            // 1. 오선 가로선 렌더링
            rhythmCtx.beginPath(); 
            rhythmCtx.moveTo(startX - 65, staffY); 
            rhythmCtx.lineTo(endX, staffY);
            rhythmCtx.lineWidth = 3.5; 
            rhythmCtx.strokeStyle = '#0f172a'; 
            rhythmCtx.stroke();
            
            // 마디선: 붙임줄 때문에 다음 마디가 생기면 같은 폭 안에서 마디선을 나누어 보여줍니다.
            rhythmCtx.fillStyle = '#0f172a';
            for (let m = 1; m <= visibleMeasures; m++) {
                const barX = startX + (m * timeSignature.top / totalBeats) * measureWidth;
                rhythmCtx.fillRect(barX - 1.5, staffY - 40, m === visibleMeasures ? 5 : 3, 80);
            }
            
            // 박자표 기보
            rhythmCtx.font = 'bold 54px "Noto Sans KR"'; 
            rhythmCtx.fillStyle = '#0f172a';
            rhythmCtx.textBaseline = 'middle'; 
            rhythmCtx.textAlign = 'center'; 
            rhythmCtx.fillText(timeSignature.top, startX - 35, staffY - 34);
            rhythmCtx.fillText(timeSignature.bottom, startX - 35, staffY + 42);

            // 2. 통합 시간 수직 격자선
            rhythmCtx.save();
            for (let c = 0; c <= totalCells; c++) {
                const cx = startX + c * cellWidth;
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(cx, staffY - 15);
                rhythmCtx.lineTo(cx, blockY + blockHeight/2 + 15);
                
                rhythmCtx.strokeStyle = 'rgba(148, 163, 184, 0.35)';
                rhythmCtx.lineWidth = c % subdivisionsPerBeat === 0 ? 1.8 : 0.8;
                rhythmCtx.setLineDash([4, 4]);
                rhythmCtx.stroke();

                // 가이드 숫자 (V자 리듬 가이드 바로 아래 정렬)
                if (c % subdivisionsPerBeat === 0 && c < totalCells) {
                    rhythmCtx.fillStyle = '#ef4444';
                    rhythmCtx.font = 'bold 15px "Noto Sans KR"';
                    rhythmCtx.textAlign = 'center';
                    rhythmCtx.fillText(`${((c / subdivisionsPerBeat) % timeSignature.top) + 1}`, cx + (cellWidth * 2), visualizerY + 28);
                }
            }
            rhythmCtx.restore();

            // 3. 음표 및 표준화 쉼표 렌더링
            let i = 0;
            const renderedTripletBeats = new Set();
            while (i < displayNotes.length) {
                const startNode = displayNotes[i];

                if (startNode.type === 'triplet') {
                    const beatStart = getTripletBeatStart(startNode);
                    if (!renderedTripletBeats.has(beatStart)) {
                        const tripletGroup = displayNotes
                            .filter(n => n.type === 'triplet' && getTripletBeatStart(n) === beatStart)
                            .sort((a, b) => a.beatOffset - b.beatOffset);
                        if (tripletGroup.length === 3 && tripletGroup.every(n => !n.isRest)) {
                            drawBeamGroup(tripletGroup, staffY);
                        }
                        renderedTripletBeats.add(beatStart);
                    }
                    i++;
                    continue;
                }

                if (isBeamableStandardNote(startNode)) {
                    let group = [startNode];
                    let j = i + 1;
                    while (j < displayNotes.length && canJoinBeamGroup(group, displayNotes[j])) {
                        group.push(displayNotes[j]);
                        j++;
                    }
                    if (group.length > 1) {
                        drawBeamGroup(group, staffY);
                        i = j;
                        continue;
                    }
                }

                drawSingleNote(startNode, staffY);
                i++;
            }

            drawAllTies(staffY);

            // 4. Newman 시간 블록 (Rhythm Ladder)
            drawTimeBlocks(startX, measureWidth, totalBeats, blockY, blockHeight, displayNotes);

            // 5. 연한 회색의 백그라운드 기본 V 격자 가이드선 우선 렌더링
            rhythmCtx.save();
            rhythmCtx.strokeStyle = '#e2e8f0';
            rhythmCtx.lineWidth = 2.5;
            rhythmCtx.lineCap = 'round';
            rhythmCtx.lineJoin = 'round';
            for (let b = 0; b < totalBeats; b++) {
                const bStartX = startX + b * beatWidth;
                const bEndX = startX + (b + 1) * beatWidth;
                const bMidX = (bStartX + bEndX) / 2;
                
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(bStartX + 8, visualizerY - 14);
                rhythmCtx.lineTo(bMidX, visualizerY + 12);
                rhythmCtx.lineTo(bEndX - 8, visualizerY - 14);
                rhythmCtx.stroke();
            }
            rhythmCtx.restore();

            // 6. 활성화된 음표들에 기초한 선명하고 곧은 V자 리듬 분석 가이드선 렌더링
            drawV자RhythmVisualizer(startX, measureWidth, totalBeats, visualizerY, cellWidth, beatWidth, displayNotes);

            // 7. 연주 재생 커서선
            if (isPlaying) {
                drawPlaybackCursor(staffY, blockY, blockHeight/2 + 15);
            }

            // 8. 예비박 가이드 오버레이 및 정간보 하단 셈여림 표시: 4/4는 강-약-중강-약, 3/4는 강-약-약
            // 격자 수직선을 관통하지 않고 칸의 시작 수직 점선(첫 박 시작 위치)에 완벽 매칭되도록 cx 오프셋 정정
            drawCountInCircles(startX, beatWidth, totalBeats, blockY, blockHeight);
        }

        function drawQuarterRestSymbol(ctx, color = '#0f172a') {
            ctx.save();
            if (!drawNotationImageSymbol(ctx, 'quarterRest')) {
                ctx.fillStyle = color;
                ctx.scale(0.88, 0.9);
                ctx.fill(new Path2D(SVG.restQuarter));
            }
            ctx.restore();
        }

        function drawSixteenthRestSymbol(ctx, color = '#0f172a') {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 3.4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(9, -26);
            ctx.lineTo(-10, 20);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(-4, -20, 3.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-4, -20);
            ctx.bezierCurveTo(5, -20, 8, -27, 9, -29);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(-8, -4, 3.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-8, -4);
            ctx.bezierCurveTo(1, -4, 5, -11, 6, -13);
            ctx.stroke();
            ctx.restore();
        }

        function drawThirtySecondRestSymbol(ctx, color = '#0f172a') {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 3.1;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(10, -30);
            ctx.lineTo(-12, 24);
            ctx.stroke();

            const dots = [
                {x: -4, y: -23, c1x: 4, c1y: -23, c2x: 8, c2y: -30, ex: 10, ey: -32},
                {x: -8, y: -8,  c1x: 0, c1y: -8,  c2x: 4, c2y: -15, ex: 6,  ey: -17},
                {x: -12,y: 7,   c1x: -4,c1y: 7,   c2x: 0, c2y: 0,   ex: 2,  ey: -2}
            ];

            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, 2.9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.bezierCurveTo(d.c1x, d.c1y, d.c2x, d.c2y, d.ex, d.ey);
                ctx.stroke();
            });
            ctx.restore();
        }

        function findTiedTarget(note) {
            const expectedStart = note.beatOffset + getBeat(note.type, note.dotted);
            return notes.find(candidate =>
                candidate.tiedTo &&
                !candidate.isRest &&
                Math.abs(candidate.beatOffset - expectedStart) < 0.01
            ) || notes.find(candidate =>
                candidate.tiedTo &&
                !candidate.isRest &&
                candidate.beatOffset > note.beatOffset
            );
        }

        function drawTieCurve(fromNote, toNote, staffY) {
            if (!fromNote || !toNote) return;
            const fromX = fromNote.x + 10.5;
            const toX = toNote.x - 10.5;
            if (toX <= fromX + 4) return;

            const y = staffY + 8.5;
            const width = toX - fromX;
            const depth = Math.max(8, Math.min(17, width * 0.13));

            rhythmCtx.save();
            rhythmCtx.strokeStyle = '#0f172a';
            rhythmCtx.lineWidth = 2.35;
            rhythmCtx.lineCap = 'round';
            rhythmCtx.lineJoin = 'round';
            rhythmCtx.beginPath();
            rhythmCtx.moveTo(fromX, y);
            rhythmCtx.quadraticCurveTo((fromX + toX) / 2, y + depth, toX, y);
            rhythmCtx.stroke();
            rhythmCtx.restore();
        }

        function drawAllTies(staffY) {
            if (tieMode && tieSourceNote && tieSourceNote.x) {
                rhythmCtx.save();
                rhythmCtx.strokeStyle = '#0f172a';
                rhythmCtx.lineWidth = 2;
                rhythmCtx.setLineDash([5, 4]);
                rhythmCtx.beginPath();
                rhythmCtx.arc(tieSourceNote.x, staffY, 20, 0, Math.PI * 2);
                rhythmCtx.stroke();
                rhythmCtx.restore();
            }
            notes.forEach(n => {
                if (!n.tied || n.isRest) return;
                const target = findTiedTarget(n);
                if (target) drawTieCurve(n, target, staffY);
            });
        }

        function drawSingleNote(n, staffY) {
            const x = n.x;
            rhythmCtx.save();
            rhythmCtx.translate(x, staffY);
            const noteColor = n.autoRest ? AUTO_REST_COLOR : '#0f172a';
            rhythmCtx.globalAlpha = n.autoRest ? 0.72 : 1;
            rhythmCtx.fillStyle = noteColor;
            rhythmCtx.strokeStyle = noteColor;
            rhythmCtx.lineWidth = 3.2;

            let usedImage = false;

            if (!n.isRest) {
                if (n.type === 'half') {
                    // 2분음표는 가운데 가로선이 보이도록 흰색 채움 없이 얇은 외곽선으로 그립니다.
                    rhythmCtx.save();
                    rhythmCtx.rotate(-0.28);
                    rhythmCtx.lineWidth = 2.0;
                    rhythmCtx.beginPath();
                    rhythmCtx.ellipse(0, 0, 12.5, 7.2, 0, 0, Math.PI * 2);
                    rhythmCtx.stroke();
                    rhythmCtx.restore();
                    rhythmCtx.lineWidth = 2.4;
                    rhythmCtx.beginPath();
                    rhythmCtx.moveTo(11, 2);
                    rhythmCtx.lineTo(11, -48);
                    rhythmCtx.stroke();
                } else if (n.type === 'eighth') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'eighthNote');
                    if (!usedImage) {
                        const h = new Path2D(SVG.headFilled);
                        rhythmCtx.fill(h);
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(11, 2);
                        rhythmCtx.lineTo(11, -48);
                        rhythmCtx.stroke();
                        rhythmCtx.fill(new Path2D(SVG.flag8));
                    }
                } else if (n.type === 'sixteenth') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'sixteenthNote');
                    if (!usedImage) {
                        const h = new Path2D(SVG.headFilled);
                        rhythmCtx.fill(h);
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(11, 2);
                        rhythmCtx.lineTo(11, -48);
                        rhythmCtx.stroke();
                        rhythmCtx.fill(new Path2D(SVG.flag16_1));
                        rhythmCtx.fill(new Path2D(SVG.flag16_2));
                    }
                } else if (n.type === 'whole') {
                    // 온음표도 외곽선만 얇게 그려 중앙 가로선이 관통해 보이게 합니다.
                    rhythmCtx.save();
                    rhythmCtx.rotate(-0.18);
                    rhythmCtx.lineWidth = 2.2;
                    rhythmCtx.beginPath();
                    rhythmCtx.ellipse(0, 0, 19, 8.3, 0, 0, Math.PI * 2);
                    rhythmCtx.stroke();
                    rhythmCtx.restore();
                } else if (n.type === 'quarter') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'quarterNote');
                    if (!usedImage) {
                        const h = new Path2D(SVG.headFilled);
                        rhythmCtx.fill(h);
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(11, 2);
                        rhythmCtx.lineTo(11, -48);
                        rhythmCtx.stroke();
                    }
                } else if (n.type === 'thirtysecond') {
                    const h = new Path2D(SVG.headFilled);
                    rhythmCtx.fill(h);
                    rhythmCtx.beginPath();
                    rhythmCtx.moveTo(11, 2);
                    rhythmCtx.lineTo(11, -48);
                    rhythmCtx.stroke();
                    rhythmCtx.fill(new Path2D(SVG.flag16_1));
                    rhythmCtx.fill(new Path2D(SVG.flag16_2));
                    rhythmCtx.fill(new Path2D(SVG.flag32_3));
                } else if (n.type === 'triplet') {
                    const h = new Path2D(SVG.headFilled);
                    rhythmCtx.fill(h);
                    rhythmCtx.beginPath();
                    rhythmCtx.moveTo(11, 2);
                    rhythmCtx.lineTo(11, -48);
                    rhythmCtx.stroke();
                }

                if (n.dotted) {
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(n.type === 'whole' ? 32 : 30, -5, 4, 0, Math.PI * 2);
                    rhythmCtx.fillStyle = noteColor;
                    rhythmCtx.fill();
                }
            } else {
                if (n.type === 'quarter') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'quarterRest');
                    if (!usedImage) drawQuarterRestSymbol(rhythmCtx, noteColor);
                } else if (n.type === 'eighth') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'eighthRest');
                    if (!usedImage) {
                        rhythmCtx.save();
                        rhythmCtx.scale(0.78, 0.78);
                        rhythmCtx.lineWidth = 3.0;
                        rhythmCtx.lineCap = 'round';
                        rhythmCtx.lineJoin = 'round';
                        rhythmCtx.beginPath();
                        rhythmCtx.arc(-3, -17, 3.5, 0, Math.PI * 2);
                        rhythmCtx.fill();
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(-3, -17);
                        rhythmCtx.bezierCurveTo(5, -17, 9, -24, 10, -27);
                        rhythmCtx.stroke();
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(10, -27);
                        rhythmCtx.lineTo(-8, 20);
                        rhythmCtx.stroke();
                        rhythmCtx.restore();
                    }
                } else if (n.type === 'sixteenth') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'sixteenthRest');
                    if (!usedImage) {
                        rhythmCtx.save();
                        rhythmCtx.scale(0.76, 0.76);
                        drawSixteenthRestSymbol(rhythmCtx, noteColor);
                        rhythmCtx.restore();
                    }
                } else if (n.type === 'triplet') {
                    usedImage = drawNotationImageSymbol(rhythmCtx, 'eighthRest', {height: 60, anchorX: 0.50, anchorY: 0.56});
                    if (!usedImage) {
                        rhythmCtx.save();
                        rhythmCtx.scale(0.92, 0.92);
                        rhythmCtx.lineWidth = 3.7;
                        rhythmCtx.lineCap = 'round';
                        rhythmCtx.lineJoin = 'round';
                        rhythmCtx.beginPath();
                        rhythmCtx.arc(-3, -17, 3.5, 0, Math.PI * 2);
                        rhythmCtx.fill();
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(-3, -17);
                        rhythmCtx.bezierCurveTo(5, -17, 9, -24, 10, -27);
                        rhythmCtx.stroke();
                        rhythmCtx.beginPath();
                        rhythmCtx.moveTo(10, -27);
                        rhythmCtx.lineTo(-8, 20);
                        rhythmCtx.stroke();
                        rhythmCtx.restore();
                    }
                } else if (n.type === 'whole') {
                    rhythmCtx.fill(new Path2D(SVG.restWhole));
                } else if (n.type === 'half') {
                    rhythmCtx.fill(new Path2D(SVG.restHalf));
                } else if (n.type === 'thirtysecond') {
                    drawThirtySecondRestSymbol(rhythmCtx, noteColor);
                }

                if (n.dotted) {
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(24, -10, 4, 0, Math.PI * 2);
                    rhythmCtx.fillStyle = noteColor;
                    rhythmCtx.fill();
                }
            }

            rhythmCtx.restore();
        }


        function drawBeamGroup(group, staffY) {
            if (!group || group.length === 0) return;
            if (group[0].type === 'triplet' && (group.length !== 3 || group.some(n => n.isRest))) return;
            rhythmCtx.save();
            rhythmCtx.strokeStyle = '#0f172a';
            rhythmCtx.fillStyle = '#0f172a';
            rhythmCtx.lineCap = 'butt';
            rhythmCtx.lineJoin = 'round';

            group.forEach(n => {
                if (n.isRest) {
                    drawSingleNote(n, staffY);
                    return;
                }
                rhythmCtx.save();
                rhythmCtx.translate(n.x, staffY);
                rhythmCtx.lineWidth = 3.2;
                rhythmCtx.fill(new Path2D(SVG.headFilled));
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(11, 2);
                rhythmCtx.lineTo(11, -48);
                rhythmCtx.stroke();
                if (n.dotted) {
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(30, -5, 4, 0, Math.PI * 2);
                    rhythmCtx.fill();
                }
                rhythmCtx.restore();
            });

            const nonRestNotes = group.filter(n => !n.isRest);
            const drawBeamBand = (x1, x2, y, width) => {
                const left = Math.min(x1, x2);
                const right = Math.max(x1, x2);
                if (right <= left + 2) return;
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(left, y);
                rhythmCtx.lineTo(right, y);
                rhythmCtx.lineWidth = width;
                rhythmCtx.stroke();
            };

            if (nonRestNotes.length > 1) {
                const firstStemX = nonRestNotes[0].x + 11;
                const lastStemX = nonRestNotes[nonRestNotes.length - 1].x + 11;
                drawBeamBand(firstStemX, lastStemX, staffY - 48, 8);

                if (group[0].type !== 'triplet') {
                    const maxLines = Math.max(...group.map(beamLineCount));
                    for (let line = 2; line <= maxLines; line++) {
                        const y = staffY - 48 + (line - 1) * 9;
                        const connected = new Set();
                        for (let idx = 0; idx < group.length - 1; idx++) {
                            const a = group[idx];
                            const b = group[idx + 1];
                            if (beamLineCount(a) >= line && beamLineCount(b) >= line) {
                                drawBeamBand(a.x + 11, b.x + 11, y, line === 2 ? 6 : 5);
                                connected.add(idx);
                                connected.add(idx + 1);
                            }
                        }
                        group.forEach((n, idx) => {
                            if (beamLineCount(n) < line || connected.has(idx)) return;
                            const stemX = n.x + 11;
                            const prev = group[idx - 1];
                            const next = group[idx + 1];
                            const neighbor = next || prev;
                            if (!neighbor) return;
                            const direction = next ? 1 : -1;
                            const neighborDistance = Math.abs((neighbor.x + 11) - stemX);
                            const stub = Math.min(22, Math.max(14, neighborDistance * 0.42));
                            drawBeamBand(stemX, stemX + direction * stub, y, line === 2 ? 6 : 5);
                        });
                    }
                }
            }

            if (group[0].type === 'triplet') {
                const first = group[0];
                const last = group[group.length - 1];
                const centerX = (first.x + last.x) / 2 + 11;
                const bracketY = staffY - 62;

                rhythmCtx.strokeStyle = '#0f172a';
                rhythmCtx.lineWidth = 2;
                rhythmCtx.lineCap = 'round';
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(first.x + 11, bracketY + 7);
                rhythmCtx.lineTo(first.x + 11, bracketY);
                rhythmCtx.lineTo(centerX - 13, bracketY);
                rhythmCtx.moveTo(last.x + 11, bracketY + 7);
                rhythmCtx.lineTo(last.x + 11, bracketY);
                rhythmCtx.lineTo(centerX + 13, bracketY);
                rhythmCtx.stroke();

                rhythmCtx.fillStyle = '#0f172a';
                rhythmCtx.font = 'bold 15px sans-serif';
                rhythmCtx.textBaseline = 'middle';
                rhythmCtx.textAlign = 'center';
                rhythmCtx.fillText('3', centerX, bracketY);
            }

            rhythmCtx.restore();
        }

        function drawTimeBlocks(startX, measureWidth, totalBeats, blockY, blockHeight, events = notes) {
            const subdivisionsPerBeat = 4;
            const totalCells = totalBeats * subdivisionsPerBeat;
            const cellWidth = measureWidth / totalCells;

            rhythmCtx.save();
            rhythmCtx.strokeStyle = '#0f172a';
            rhythmCtx.lineWidth = 2.5;
            rhythmCtx.strokeRect(startX, blockY - blockHeight/2, measureWidth, blockHeight);
            rhythmCtx.restore();

            events.forEach(n => {
                const px = n.startX;
                const pWidth = n.endX - n.startX;

                rhythmCtx.save();
                rhythmCtx.strokeStyle = n.autoRest ? 'rgba(100, 116, 139, 0.55)' : '#0f172a';
                rhythmCtx.lineWidth = n.autoRest ? 1.6 : 2;
                if (n.isRest) {
                    rhythmCtx.setLineDash(n.autoRest ? [3, 5] : [4, 4]); 
                } else {
                    rhythmCtx.setLineDash([]);
                }
                drawRoundedRect(rhythmCtx, px + 2, blockY - blockHeight/2 + 2, pWidth - 4, blockHeight - 4, 4, false, true);
                rhythmCtx.restore();

                if (!n.isRest) {
                    const rawVisibleCells = n.beatDuration * GRID_SUBDIVISIONS_PER_BEAT;
                    const usesHalfCell = Math.abs(rawVisibleCells - Math.round(rawVisibleCells)) > 0.001;
                    const numSubBlocks = (n.type === 'triplet') ? 1 : Math.max(1, usesHalfCell ? Math.round(n.beatDuration * GRID_SELECTION_UNITS_PER_BEAT) : Math.round(rawVisibleCells));
                    const subW = (pWidth - 4) / numSubBlocks;

                    for (let s = 0; s < numSubBlocks; s++) {
                        const subX = px + 2 + s * subW;
                        
                        let fillPercent = 1.0;
                        if (isPlaying) {
                            fillPercent = Math.max(0, Math.min(1.0, (currentPlaybackX - subX) / (subW - 2)));
                        }

                        if (fillPercent > 0) {
                            rhythmCtx.save();
                            const grad = rhythmCtx.createLinearGradient(subX, blockY - blockHeight/2 + 4, subX, blockY + blockHeight/2 - 4);
                            grad.addColorStop(0, '#818cf8');
                            grad.addColorStop(1, '#4f46e5');
                            rhythmCtx.fillStyle = grad;
                            rhythmCtx.fillRect(subX + 1.5, blockY - blockHeight/2 + 4, Math.max(1, (subW - 3) * fillPercent), blockHeight - 8);
                            rhythmCtx.restore();
                        }
                    }
                }
            });

            // 마우스 드래그를 통한 실시간 정간보 색칠하기 하이라이트 가이드 레이어
            if (isGridDragging) {
                const totalSelectionUnits = totalBeats * GRID_SELECTION_UNITS_PER_BEAT;
                let minCell = Math.min(dragStartCell, dragEndCell);
                let maxCell = Math.max(dragStartCell, dragEndCell);
                if (minCell === maxCell) {
                    if (maxCell < totalSelectionUnits) maxCell += 1;
                    else minCell = Math.max(0, minCell - 1);
                }
                const selectionUnitWidth = measureWidth / totalSelectionUnits;
                const fillStartX = startX + minCell * selectionUnitWidth;
                const fillWidth = Math.max(1, (maxCell - minCell) * selectionUnitWidth);

                rhythmCtx.save();
                rhythmCtx.fillStyle = 'rgba(79, 70, 229, 0.35)'; // 우아한 반투명 인디고 인디케이터
                rhythmCtx.strokeStyle = '#4f46e5';
                rhythmCtx.lineWidth = 2.5;
                rhythmCtx.fillRect(fillStartX, blockY - blockHeight/2, fillWidth, blockHeight);
                rhythmCtx.strokeRect(fillStartX, blockY - blockHeight/2, fillWidth, blockHeight);
                rhythmCtx.restore();
            }

            rhythmCtx.save();
            for (let c = 1; c < totalCells; c++) {
                const cx = startX + c * cellWidth;
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(cx, blockY - blockHeight/2);
                rhythmCtx.lineTo(cx, blockY + blockHeight/2);
                rhythmCtx.strokeStyle = c % subdivisionsPerBeat === 0 ? '#0f172a' : 'rgba(15, 23, 42, 0.22)';
                rhythmCtx.lineWidth = c % subdivisionsPerBeat === 0 ? 2 : 1;
                rhythmCtx.stroke();
            }
            rhythmCtx.restore();
        }

        function getVPoint(b, t, bStartX, bEndX, bMidX, visualizerY) {
            const margin = 8;
            const effectiveStartX = bStartX + margin;
            const effectiveEndX = bEndX - margin;

            if (t <= 0.5) {
                const factor = t / 0.5;
                return {
                    x: effectiveStartX + factor * (bMidX - effectiveStartX),
                    y: (visualizerY - 14) + factor * 26
                };
            } else {
                const factor = (t - 0.5) / 0.5;
                return {
                    x: bMidX + factor * (effectiveEndX - bMidX),
                    y: (visualizerY + 12) - factor * 26
                };
            }
        }

        // V자 리듬 분석 가이드선 렌더링
        // 셋잇단음표 3개는 한 박 안에서 ∨ 하나를 3조각으로,
        // 8분음표 2개, 16분음표 4개, 32분음표 8개는 한 박 안에서 ∨ 하나를 각각의 조각으로 나눠 그립니다.
        // 조각 사이에는 아주 작은 빈틈을 두어 서로 붙어서 검게 뭉치지 않게 합니다.
        function drawV자RhythmVisualizer(startX, measureWidth, totalBeats, visualizerY, cellWidth, beatWidth, events = notes) {
            const isBeatBoundary = (value) => Math.abs(value - Math.round(value)) < 0.002;

            events.forEach(n => {
                const startBeat = n.beatOffset;
                const endBeat = n.beatOffset + n.beatDuration;
                const splitIntoPieces = !n.isRest && (n.type === 'triplet' || n.type === 'eighth' || n.type === 'sixteenth' || n.type === 'thirtysecond');
                const pieceGap = splitIntoPieces ? Math.min(n.beatDuration * 0.11, 0.022) : 0;

                rhythmCtx.save();
                if (n.isRest) {
                    rhythmCtx.strokeStyle = '#0f172a';
                    rhythmCtx.setLineDash([4, 4]);
                    rhythmCtx.lineWidth = 3;
                } else {
                    rhythmCtx.strokeStyle = '#0f172a'; 
                    rhythmCtx.setLineDash([]);
                    rhythmCtx.lineWidth = 4;
                }
                rhythmCtx.lineCap = 'round';
                rhythmCtx.lineJoin = 'round';

                for (let b = 0; b < totalBeats; b++) {
                    const bStartX = startX + b * beatWidth;
                    const bEndX = startX + (b + 1) * beatWidth;
                    const bMidX = (bStartX + bEndX) / 2;

                    const t1 = Math.max(startBeat, b);
                    const t2 = Math.min(endBeat, b + 1);

                    if (t1 < t2 - 0.001) {
                        let localT1 = t1 - b;
                        let localT2 = t2 - b;

                        if (splitIntoPieces) {
                            if (!isBeatBoundary(t1)) localT1 += pieceGap;
                            if (!isBeatBoundary(t2)) localT2 -= pieceGap;
                        }

                        if (localT1 >= localT2 - 0.001) continue;

                        rhythmCtx.beginPath();
                        const pStart = getVPoint(b, localT1, bStartX, bEndX, bMidX, visualizerY);
                        rhythmCtx.moveTo(pStart.x, pStart.y);
                        
                        if (localT1 < 0.5 && localT2 > 0.5) {
                            const pMid = getVPoint(b, 0.5, bStartX, bEndX, bMidX, visualizerY);
                            rhythmCtx.lineTo(pMid.x, pMid.y);
                        }
                        
                        const pEnd = getVPoint(b, localT2, bStartX, bEndX, bMidX, visualizerY);
                        rhythmCtx.lineTo(pEnd.x, pEnd.y);
                        rhythmCtx.stroke();
                    }
                }
                rhythmCtx.restore();
            });
        }

        function drawVShape(ctx, x, y, rx = 12, ry = 10) {
            ctx.save();
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3.8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(x - rx, y - ry);
            ctx.lineTo(x, y + ry);
            ctx.lineTo(x + rx, y - ry);
            ctx.stroke();

            ctx.fillStyle = '#1e293b';
            [[x - rx, y - ry], [x, y + ry], [x + rx, y - ry]].forEach(([dotX, dotY]) => {
                ctx.beginPath();
                ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function drawVShapeCustomSize(ctx, x, y, rx = 8, ry = 8) {
            ctx.save();
            ctx.strokeStyle = '#0f172a'; 
            ctx.lineWidth = 3.2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(x - rx, y - ry);
            ctx.lineTo(x, y + ry);
            ctx.lineTo(x + rx, y - ry);
            ctx.stroke();

            ctx.fillStyle = '#0f172a';
            [[x - rx, y - ry], [x, y + ry], [x + rx, y - ry]].forEach(([dotX, dotY]) => {
                ctx.beginPath();
                ctx.arc(dotX, dotY, 3.5, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function drawRoundedRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        function drawCountInOverlay(startX, measureWidth, totalBeats, blockY) {
            rhythmCtx.save();
            rhythmCtx.fillStyle = 'rgba(15, 23, 42, 0.72)';
            rhythmCtx.fillRect(startX, blockY - 60, measureWidth, 50);

            rhythmCtx.fillStyle = '#f8fafc';
            rhythmCtx.font = 'bold 20px "Noto Sans KR"';
            rhythmCtx.textAlign = 'center';
            rhythmCtx.textBaseline = 'middle';
            rhythmCtx.fillText(`예비박 진행 중 :  ${currentCountInBeat} 🎵`, startX + measureWidth/2, blockY - 35);
            rhythmCtx.restore();
        }

        // playTone 함수 볼륨(volume) 매개변수를 기본화하여 제어력 증강
        function playTone(freq, duration, volume = 0.18, type = 'sine') {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = type;
            osc.frequency.value = freq;
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playWarningTone() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [0, 0.11, 0.22].forEach((delay, i) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(i === 1 ? 220 : 165, now + delay);
                gainNode.gain.setValueAtTime(0.28, now + delay);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.09);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(now + delay);
                osc.stop(now + delay + 0.1);
            });
        }

        // 예비박 서클 가이드 및 셈여림 한글 융합 드로잉
        // 셈여림 표시는 각 박의 첫 번째 정간보 칸 중심 바로 아래에 정렬합니다.
        function drawCountInCircles(startX, beatWidth, totalBeats, blockY, blockHeight) {
            rhythmCtx.save();
            const circlesY = blockY + blockHeight/2 + 25;
            const beatLabels = Array.from({length: totalBeats}, (_, i) => (i === 0 ? "강" : (totalBeats === 4 && i === 2 ? "중강" : "약")));

            for (let b = 0; b < totalBeats; b++) {
                // 각 박의 시작선이 아니라, 그 박의 첫 번째 칸(16분 셀) 중심 바로 아래에 셈여림 표시를 놓습니다.
                // beatWidth는 1박, 한 박은 4칸이므로 첫 칸 중심은 시작선에서 beatWidth / 8만큼 오른쪽입니다.
                const cx = startX + b * beatWidth + (beatWidth / 8);
                
                let isActive = false;
                if (isCountingIn) {
                    isActive = (currentCountInBeat === b + 1);
                } else if (isPlaying) {
                    const elapsedBeats = (currentPlaybackX - startX) / beatWidth;
                    isActive = (Math.floor(elapsedBeats) === b);
                }

                rhythmCtx.strokeStyle = isActive ? '#4f46e5' : '#475569';
                rhythmCtx.lineWidth = isActive ? 3 : 1.5;

                const beatType = (b === 0) ? 0 : ((totalBeats === 4 && b === 2) ? 2 : 1); // 4/4만 3박을 중강으로 표시, 3/4는 강-약-약

                if (beatType === 0) {
                    // 첫 박 ◎ (겹동그라미) - 강 (최대 크기)
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(cx, circlesY, 11, 0, Math.PI * 2);
                    rhythmCtx.stroke();
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(cx, circlesY, 5, 0, Math.PI * 2);
                    if (isActive) {
                        rhythmCtx.fillStyle = '#4f46e5';
                        rhythmCtx.fill();
                    } else {
                        rhythmCtx.stroke();
                    }
                } else if (beatType === 2) {
                    // 세 번째 박 ○ (중간 동그라미) - 중강 (r=8)
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(cx, circlesY, 8, 0, Math.PI * 2);
                    if (isActive) {
                        rhythmCtx.fillStyle = '#4f46e5';
                        rhythmCtx.fill();
                    } else {
                        rhythmCtx.stroke();
                    }
                } else {
                    // 두 번째 및 네 번째 박 ○ (작은 동그라미) - 약 (r=5) ◀ 확실하게 작게 설정하여 차별화
                    rhythmCtx.beginPath();
                    rhythmCtx.arc(cx, circlesY, 5, 0, Math.PI * 2);
                    if (isActive) {
                        rhythmCtx.fillStyle = '#4f46e5';
                        rhythmCtx.fill();
                    } else {
                        rhythmCtx.stroke();
                    }
                }

                const label = beatLabels[b];
                rhythmCtx.fillStyle = isActive ? '#4f46e5' : '#475569';
                rhythmCtx.font = isActive ? 'bold 13px "Noto Sans KR"' : '500 12px "Noto Sans KR"';
                rhythmCtx.textAlign = 'center';
                rhythmCtx.textBaseline = 'top';
                rhythmCtx.fillText(label, cx, circlesY + 16);
            }
            rhythmCtx.restore();
        }

        function togglePlay() {
            if (isPlaying || isCountingIn) {
                stopPerformance();
            } else {
                isFirstIteration = true; 
                startPerformance();
            }
        }

        function startPerformance() {
            const timeline = getTimelineGaps();

            if (timeline.hasOverlap || timeline.hasOverflow) {
                initAudio();
                playTone(180, 0.35, 0.25);
                showValidationAlert('음표가 서로 겹치거나 마디 범위를 넘었습니다. 겹친 부분을 지워 주세요.');
                return;
            }

            if (notes.length === 0) {
                initAudio();
                playTone(180, 0.18, 0.16);
                showValidationAlert('아직 입력한 리듬이 없습니다. 정간보 칸을 칠해 음표를 만들어 보세요.');
                return;
            }

            if (timeline.gapTotal > 0.005) {
                initAudio();
                playTone(180, 0.28, 0.22);
                showValidationAlert(getGapWarningMessage(timeline));
                return;
            }

            initAudio();
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "⏹ 연주 중지";
            playBtn.classList.add('playing');
            playBtn.setAttribute('aria-pressed', 'true');

            const tempo = 60; 
            const beatDuration = 60 / tempo; 
            const totalBeats = getVisibleTimelineBeats();
            const countInBeats = timeSignature.top;

            playTimeouts.forEach(t => clearTimeout(t));
            playTimeouts = [];

            if (isFirstIteration) {
                isCountingIn = true;
                currentCountInBeat = 1;
                drawAll();

                for (let b = 0; b < countInBeats; b++) {
                    const delayTime = b * beatDuration;
                    const tCountSound = setTimeout(() => {
                        if (!isCountingIn) return;
                        currentCountInBeat = b + 1;
                        playTone(b === 0 ? 1000 : 750, 0.05, 0.045); // 예비박은 작게, 하지만 분명하게
                        drawAll();
                    }, delayTime * 1000);
                    playTimeouts.push(tCountSound);
                }

                const startActualPlayTime = countInBeats * beatDuration;

                const tStartPlay = setTimeout(() => {
                    isCountingIn = false;
                    executeCorePlayback(beatDuration, totalBeats);
                }, startActualPlayTime * 1000);
                
                playTimeouts.push(tStartPlay);
            } else {
                isCountingIn = false;
                executeCorePlayback(beatDuration, totalBeats);
            }
        }

        function getTiedChainDuration(firstNote) {
            let duration = getBeat(firstNote.type, firstNote.dotted);
            let current = firstNote;
            let guard = 0;
            while (current.tied && guard < 16) {
                const target = findTiedTarget(current);
                if (!target) break;
                duration += getBeat(target.type, target.dotted);
                current = target;
                guard++;
            }
            return duration;
        }

        function executeCorePlayback(beatDuration, totalBeats) {
            isPlaying = true;
            currentPlaybackX = 200;
            
            const startRealTime = audioCtx.currentTime;

            // 메트로놈 볼륨 최저화 (0.04로 정밀 감쇠)
            for (let b = 0; b < totalBeats; b++) {
                const metroTime = b * beatDuration;
                const tMetro = setTimeout(() => {
                    if (!isPlaying) return;
                    playTone(b % timeSignature.top === 0 ? 1200 : 820, 0.035, 0.055);
                }, metroTime * 1000);
                playTimeouts.push(tMetro);
            }

            // 기보된 리듬 음표 소리는 선명하게 발음 (0.18 유지, 붙임줄 연주 지원)
            notes.forEach((n) => {
                if (n.tiedTo) return; 

                let duration = getTiedChainDuration(n) * beatDuration;

                if (!n.isRest) {
                    const tNote = setTimeout(() => {
                        if (!isPlaying) return;
                        playTone(523.25, duration * 0.88, 0.18); 
                    }, (n.beatOffset * beatDuration) * 1000);
                    playTimeouts.push(tNote);
                }
            });

            animateCursor(startRealTime, beatDuration, totalBeats);

            const loopCycleTime = totalBeats * beatDuration;
            const endTimeout = setTimeout(() => {
                if (isPlaying) {
                    isFirstIteration = false; 
                    startPerformance(); 
                }
            }, loopCycleTime * 1000);
            playTimeouts.push(endTimeout);
        }

        function stopPerformance() {
            isPlaying = false;
            isCountingIn = false;
            isFirstIteration = true; 
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "▶ 전체 연주";
            playBtn.classList.remove('playing');
            playBtn.setAttribute('aria-pressed', 'false');
            
            playTimeouts.forEach(t => clearTimeout(t));
            playTimeouts = [];
            cancelAnimationFrame(playbackAnimFrame);
            drawAll();
        }

        function animateCursor(startRealTime, beatDuration, totalBeats) {
            if (!isPlaying) return;

            const startX = 200;
            const measureWidth = rhythmCanvas.width - 300;

            const drawCursor = () => {
                if (!isPlaying) return;
                
                const elapsed = audioCtx.currentTime - startRealTime;
                const totalDuration = totalBeats * beatDuration;
                
                if (elapsed < 0) {
                    currentPlaybackX = startX;
                } else {
                    const ratio = Math.min(elapsed / totalDuration, 1.0);
                    currentPlaybackX = startX + ratio * measureWidth;
                }

                drawAll();
                playbackAnimFrame = requestAnimationFrame(drawCursor);
            };

            playbackAnimFrame = requestAnimationFrame(drawCursor);
        }

        function drawPlaybackCursor(staffY, blockY, margin) {
            rhythmCtx.save();
            rhythmCtx.strokeStyle = '#ef4444';
            rhythmCtx.lineWidth = 3;
            rhythmCtx.shadowColor = 'rgba(239, 68, 68, 0.5)';
            rhythmCtx.shadowBlur = 6;
            rhythmCtx.beginPath();
            rhythmCtx.moveTo(currentPlaybackX, staffY - 45);
            rhythmCtx.lineTo(currentPlaybackX, blockY + margin);
            rhythmCtx.stroke();
            rhythmCtx.restore();
        }


        // 최초 접속 튜토리얼
        const TUTORIAL_STORAGE_KEY = 'rhythmNotationTutorialHidden_v9';
        const TUTORIAL_SESSION_KEY = 'rhythmNotationTutorialShown_session_v1';
        const tutorialSteps = [

            {
                title: '전체 연주',
                body: `• <span class="tutorial-highlight">전체 연주</span>를 누르면 입력한 리듬을 바로 들을 수 있습니다.
• 박이 부족하거나 초과하면 안내가 나타납니다.`,
                anchor: 'play',
                placement: 'top'
            },
            {
                title: '붙임줄',
                body: `• <span class="tutorial-highlight">붙임줄</span>을 누른 뒤 연결할 두 음표를 차례로 선택하세요.
• 같은 높이의 인접한 음표를 연결할 때 사용합니다.`,
                anchor: 'tie',
                placement: 'bottom'
            },
            {
                title: '되돌리기',
                body: `• 잘못 입력하거나 방금 한 작업을 취소하려면 <span class="tutorial-highlight">되돌리기</span>를 누르세요.
• 한 번 누를 때마다 직전 작업으로 돌아갑니다.`,
                anchor: 'undo',
                placement: 'bottom'
            },
            {
                title: '선택 삭제',
                body: `• <span class="tutorial-highlight">선택 삭제</span>를 누르면 삭제 모드가 켜집니다.
• 지울 음표나 쉼표를 계속 클릭하면 여러 개를 연속으로 삭제할 수 있습니다.
• 버튼을 다시 누르면 삭제 모드가 꺼집니다.`,
                anchor: 'delete',
                placement: 'bottom'
            },
            {
                title: '전체 삭제',
                body: `• <span class="tutorial-highlight">전체 삭제</span>는 현재 악보의 모든 입력을 한 번에 지웁니다.
• 일부만 지우려면 선택 삭제를 사용하세요.`,
                anchor: 'clear',
                placement: 'bottom'
            },
            {
                title: '도움말 다시 보기',
                body: `• 설명이 다시 필요하면 화면 위쪽의 <span class="tutorial-highlight">도움말</span> 버튼을 누르세요.
• “다시 보지 않기”를 선택하면 다음 접속부터 자동으로 뜨지 않습니다.

이제 리듬을 자유롭게 창작해 보세요.`,
                anchor: 'help',
                placement: 'bottom'
            }
        ];
        let tutorialIndex = 0;
        let currentTutorialTarget = [];

        function getTutorialElements() {
            return {
                overlay: document.getElementById('tutorialOverlay'),
                card: document.getElementById('tutorialCard'),
                count: document.getElementById('tutorialCount'),
                title: document.getElementById('tutorialTitle'),
                body: document.getElementById('tutorialBody'),
                never: document.getElementById('tutorialNeverAgain'),
                skip: document.getElementById('tutorialSkipBtn'),
                prev: document.getElementById('tutorialPrevBtn'),
                next: document.getElementById('tutorialNextBtn'),
                preview: document.getElementById('tutorialNotationPreview'),
                groupHighlight: document.getElementById('tutorialGroupHighlight')
            };
        }

        function hideTutorialNotationPreview() {
            const preview = document.getElementById('tutorialNotationPreview');
            if (preview) preview.classList.remove('show');
        }

        function positionTutorialNotationPreview() {
            const preview = document.getElementById('tutorialNotationPreview');
            const canvas = document.getElementById('canvasArea');
            if (!preview || !canvas || tutorialIndex !== 2) { hideTutorialNotationPreview(); return; }
            const r = canvas.getBoundingClientRect();
            preview.classList.add('show');
            const pr = preview.getBoundingClientRect();
            const pad = 18;
            let left = r.right - pr.width - pad;
            let top = r.top + Math.max(pad, (r.height - pr.height) / 2);
            left = Math.max(pad, Math.min(left, window.innerWidth - pr.width - pad));
            top = Math.max(pad, Math.min(top, window.innerHeight - pr.height - pad));
            preview.style.left = `${left}px`;
            preview.style.top = `${top}px`;
        }

        function getTutorialAnchor(anchor) {
            if (!anchor) return null;
            if (anchor === 'canvas') return document.getElementById('canvasArea');
            if (anchor === 'play') return document.getElementById('playBtn');
            if (anchor === 'delete') return document.getElementById('btn-delete-note');
            if (anchor === 'undo') return document.getElementById('btn-undo');
            if (anchor === 'tie') return document.getElementById('btn-tie-note');
            if (anchor === 'help') return document.getElementById('btn-help-tutorial');
            if (anchor === 'clear') return document.getElementById('btn-clear-all') || Array.from(document.querySelectorAll('button[onclick]')).find(el => (el.getAttribute('onclick') || '').includes('confirmClear'));
            if (anchor === 'undoClear') {
                return [document.getElementById('btn-undo'), document.getElementById('btn-clear-all')].filter(Boolean);
            }
            if (anchor === 'noteRestButtons') {
                return Array.from(document.querySelectorAll('.guide-cell[onclick]')).filter(el => (el.getAttribute('onclick') || '').includes('addNoteSmart'));
            }
            if (anchor === 'dotButton') {
                return Array.from(document.querySelectorAll('.guide-cell[onclick]')).find(el => (el.getAttribute('onclick') || '').includes('toggleLastDot'));
            }
            return document.querySelector(anchor);
        }

        function normalizeTutorialTargets(target) {
            if (!target) return [];
            return Array.isArray(target) ? target.filter(Boolean) : [target];
        }

        function getCombinedRect(targets) {
            const rects = normalizeTutorialTargets(targets).map(el => el.getBoundingClientRect());
            if (!rects.length) return null;
            const left = Math.min(...rects.map(r => r.left));
            const top = Math.min(...rects.map(r => r.top));
            const right = Math.max(...rects.map(r => r.right));
            const bottom = Math.max(...rects.map(r => r.bottom));
            return { left, top, right, bottom, width: right - left, height: bottom - top };
        }

        function clearTutorialHighlight() {
            normalizeTutorialTargets(currentTutorialTarget).forEach(el => el.classList.remove('tutorial-target-highlight'));
            currentTutorialTarget = [];
            const box = document.getElementById('tutorialGroupHighlight');
            if (box) box.classList.remove('show');
        }

        function showTutorialGroupHighlight(rect) {
            const box = document.getElementById('tutorialGroupHighlight');
            if (!box || !rect) return;
            const margin = 6;
            box.style.left = `${Math.max(4, rect.left - margin)}px`;
            box.style.top = `${Math.max(4, rect.top - margin)}px`;
            box.style.width = `${Math.min(window.innerWidth - 8, rect.width + margin * 2)}px`;
            box.style.height = `${Math.min(window.innerHeight - 8, rect.height + margin * 2)}px`;
            box.classList.add('show');
        }

        function positionTutorialCard() {
            const el = getTutorialElements();
            if (!el.card || !el.overlay || !el.overlay.classList.contains('show')) return;
            const step = tutorialSteps[tutorialIndex];
            const targets = normalizeTutorialTargets(getTutorialAnchor(step.anchor));
            const rect = getCombinedRect(targets);
            clearTutorialHighlight();

            el.card.dataset.placement = '';
            el.card.style.setProperty('--arrow-left', '50%');
            el.card.style.setProperty('--arrow-top', '50%');

            if (!rect) {
                el.card.style.left = '50%';
                el.card.style.top = '50%';
                el.card.style.transform = 'translate(-50%, -50%)';
                hideTutorialNotationPreview();
                return;
            }

            currentTutorialTarget = targets;
            currentTutorialTarget.forEach(target => target.classList.add('tutorial-target-highlight'));
            showTutorialGroupHighlight(rect);

            const gap = 14;
            const pad = 10;
            const cardRect = el.card.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            let placement = step.placement || 'bottom';
            let left = rect.left + rect.width / 2 - cardRect.width / 2;
            let top = rect.bottom + gap;

            if (placement === 'center') {
                left = rect.left + rect.width / 2 - cardRect.width / 2;
                top = rect.top + rect.height / 2 - cardRect.height / 2;
            } else if (placement === 'bottom') {
                top = rect.bottom + gap;
                if (top + cardRect.height > vh - pad) placement = 'top';
            } else if (placement === 'top') {
                top = rect.top - cardRect.height - gap;
                if (top < pad) placement = 'bottom';
            } else if (placement === 'right') {
                left = rect.right + gap;
                top = rect.top + rect.height / 2 - cardRect.height / 2;
                if (left + cardRect.width > vw - pad) placement = 'left';
            } else if (placement === 'left') {
                left = rect.left - cardRect.width - gap;
                top = rect.top + rect.height / 2 - cardRect.height / 2;
                if (left < pad) placement = 'right';
            }

            if (placement === 'bottom') { left = rect.left + rect.width / 2 - cardRect.width / 2; top = rect.bottom + gap; }
            if (placement === 'top') { left = rect.left + rect.width / 2 - cardRect.width / 2; top = rect.top - cardRect.height - gap; }
            if (placement === 'right') { left = rect.right + gap; top = rect.top + rect.height / 2 - cardRect.height / 2; }
            if (placement === 'left') { left = rect.left - cardRect.width - gap; top = rect.top + rect.height / 2 - cardRect.height / 2; }

            left = Math.max(pad, Math.min(left, vw - cardRect.width - pad));
            top = Math.max(pad, Math.min(top, vh - cardRect.height - pad));
            el.card.style.left = `${left}px`;
            el.card.style.top = `${top}px`;
            el.card.style.transform = 'none';
            el.card.dataset.placement = placement === 'center' ? '' : placement;

            if (placement === 'top' || placement === 'bottom') {
                const arrowLeft = rect.left + rect.width / 2 - left;
                el.card.style.setProperty('--arrow-left', `${Math.max(18, Math.min(arrowLeft, cardRect.width - 18))}px`);
            } else if (placement === 'left' || placement === 'right') {
                const arrowTop = rect.top + rect.height / 2 - top;
                el.card.style.setProperty('--arrow-top', `${Math.max(18, Math.min(arrowTop, cardRect.height - 18))}px`);
            }
            hideTutorialNotationPreview();
        }

        function renderTutorialStep() {
            const el = getTutorialElements();
            if (!el.overlay) return;
            const step = tutorialSteps[tutorialIndex];
            el.count.textContent = `${tutorialIndex + 1} / ${tutorialSteps.length}`;
            el.title.textContent = step.title;
            el.body.innerHTML = step.body;
            el.prev.disabled = tutorialIndex === 0;
            el.next.textContent = tutorialIndex === tutorialSteps.length - 1 ? '시작하기' : '다음';
            hideTutorialNotationPreview();
            requestAnimationFrame(positionTutorialCard);
        }

        function closeTutorial() {
            const el = getTutorialElements();
            if (el.never && el.never.checked) {
                localStorage.setItem(TUTORIAL_STORAGE_KEY, 'true');
            }
            clearTutorialHighlight();
            hideTutorialNotationPreview();
            if (el.overlay) el.overlay.classList.remove('show');
        }

        function showTutorial(force = false) {
            if (!force && localStorage.getItem(TUTORIAL_STORAGE_KEY) === 'true') return;
            const el = getTutorialElements();
            if (!el.overlay) return;
            tutorialIndex = 0;
            if (el.never) el.never.checked = false;
            el.overlay.classList.add('show');
            renderTutorialStep();
            setTimeout(positionTutorialCard, 60);
        }

        function initTutorial() {
            const el = getTutorialElements();
            if (!el.overlay || el.overlay.dataset.bound === 'true') return;
            el.overlay.dataset.bound = 'true';

            el.skip.addEventListener('click', closeTutorial);
            el.prev.addEventListener('click', () => {
                tutorialIndex = Math.max(0, tutorialIndex - 1);
                renderTutorialStep();
            });
            el.next.addEventListener('click', () => {
                if (tutorialIndex >= tutorialSteps.length - 1) {
                    closeTutorial();
                    return;
                }
                tutorialIndex += 1;
                renderTutorialStep();
            });
            el.never.addEventListener('change', () => {
                if (el.never.checked) localStorage.setItem(TUTORIAL_STORAGE_KEY, 'true');
            });
            el.overlay.addEventListener('click', (e) => {
                if (e.target === el.overlay) closeTutorial();
            });
            window.addEventListener('resize', () => setTimeout(positionTutorialCard, 80));
            window.addEventListener('orientationchange', () => setTimeout(positionTutorialCard, 250));
            document.addEventListener('keydown', (e) => {
                if (!el.overlay.classList.contains('show')) return;
                if (e.key === 'Escape') closeTutorial();
                if (e.key === 'ArrowRight' || e.key === 'Enter') el.next.click();
                if (e.key === 'ArrowLeft') el.prev.click();
            });

            const params = new URLSearchParams(location.search);
            if (params.get('tutorial') === '1') {
                localStorage.removeItem(TUTORIAL_STORAGE_KEY);
                sessionStorage.removeItem(TUTORIAL_SESSION_KEY);
                sessionStorage.setItem(TUTORIAL_SESSION_KEY, 'true');
                showTutorial(true);
            } else if (localStorage.getItem(TUTORIAL_STORAGE_KEY) !== 'true' && sessionStorage.getItem(TUTORIAL_SESSION_KEY) !== 'true') {
                sessionStorage.setItem(TUTORIAL_SESSION_KEY, 'true');
                setTimeout(() => showTutorial(false), 450);
            }
        }
        window.addEventListener('DOMContentLoaded', initTutorial);
        window.addEventListener('load', () => setTimeout(initTutorial, 100));

    </script>
</body>
</html>
